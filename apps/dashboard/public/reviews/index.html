<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revisiones — grilla de estado</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2e38; --text: #e6e8ec;
    --muted: #9aa1ac; --ok: #3ecf8e; --warn: #f0a63a; --bad: #e05b5b; --accent: #5b8def; --corrected: #a48af5;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8; --panel: #ffffff; --border: #dde1e7; --text: #1b1e24;
      --muted: #5b6270; --ok: #1a9c63; --warn: #b5720a; --bad: #c23f3f; --accent: #2f5fd6; --corrected: #6a3fd6;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .toolbar { display: flex; flex-direction: column; gap: 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px;
    position: sticky; top: 0; z-index: 10; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filters .filters-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: 2px; }
  button { font: inherit; font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: rgba(127,127,127,0.08); color: var(--text); cursor: pointer; }
  button:hover { background: rgba(127,127,127,0.18); }
  button.active { outline: 2px solid var(--accent); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
  .legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .grid-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  thead th { text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    padding: 8px 6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  thead th:first-child { text-align: left; }
  tbody td { padding: 4px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  td.set-name { text-align: left; font-weight: 600; padding: 8px 10px; white-space: nowrap;
    position: sticky; left: 0; background: var(--panel); }

  a.cell, span.cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    border-radius: 6px; padding: 6px 4px; min-width: 64px; min-height: 40px; text-decoration: none; color: inherit; }
  a.cell:hover { outline: 2px solid var(--accent); }
  .cell .main { font-size: 12px; font-weight: 700; }
  .cell .sub { font-size: 10px; opacity: .85; }
  .cell.pendiente { background: rgba(127,127,127,0.08); color: var(--muted); }
  .cell.analizado { background: rgba(91,141,239,0.15); color: var(--accent); }
  .cell.revisado { background: rgba(240,166,58,0.15); color: var(--warn); }
  .cell.aplicado { background: rgba(62,207,142,0.15); color: var(--ok); }

  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  .updated { color: var(--muted); font-size: 11px; text-align: center; margin-top: 20px; }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .toolbar { position: static; }
  }
</style>
</head>
<body>
<h1>Revisiones</h1>
<div class="subtitle">Estado de auditoría de imágenes por set. Tocá una celda con reporte para revisar las cartas marcadas.</div>

<div class="toolbar">
  <span class="filters" id="tipoFilters">
    <span class="filters-label">Tipo</span>
    <button data-t="all" class="active">Todos</button>
  </span>
  <span class="filters" id="estadoFilters">
    <span class="filters-label">Estado</span>
    <button data-e="all" class="active">Todos</button>
    <button data-e="pendiente">Pendiente</button>
    <button data-e="analizado">Analizado</button>
    <button data-e="revisado">Revisado</button>
    <button data-e="aplicado">Aplicado</button>
  </span>
  <span class="legend">
    <span><span class="dot" style="background:var(--muted)"></span>Pendiente</span>
    <span><span class="dot" style="background:var(--accent)"></span>Analizado</span>
    <span><span class="dot" style="background:var(--warn)"></span>Revisado</span>
    <span><span class="dot" style="background:var(--ok)"></span>Aplicado</span>
  </span>
</div>

<div class="grid-wrap"><div class="empty" id="list">Cargando índice…</div></div>
<div class="updated" id="updated"></div>

<script>
const BASE = 'https://pub-4ab8e43f10604d7fa0f9402a8259a855.r2.dev/tools/reports/';
const TARGET = { titulos: 'title-review.html', keywords: 'keyword-review.html', setnum: 'setnum-review.html', reglas: 'reglas-review.html' };
const LABEL = { titulos: 'Títulos', keywords: 'Keywords', setnum: 'Set+número', reglas: 'Reglas', versions: 'Versiones (Current)' };
const TIPO_ORDER = ['versions', 'titulos', 'keywords', 'setnum', 'reglas'];

// Orden cronológico de salida (confirmado por Guillermo).
const SET_ORDER = [
  'KD', 'Tomorrow', 'TTT', 'CotM', 'Samurai', 'SamuraiBanzai', 'STS', 'EJC', 'HV', 'WaD',
  'THW', 'GotE', 'IG1', 'DaK', 'Celestial', 'CE15', 'CE15MRP', 'IG2', 'PotD', 'TH', 'TPW',
  'IG3', 'BoKT', 'EaW', 'TDoW', 'BtD', 'FL', 'SC', 'WoH', 'Emperor', 'EmperorMRP', 'EoW',
  'TSE', 'SoD', 'HaT', 'EEGempukku', 'TA', 'CoM', 'GoC', 'AM', 'AMoH', 'Ivory', 'TCS',
  'ALitS', 'TNO', 'TCW', 'TwentyFestivals', 'ThA', 'EP', 'SCW', 'SExMRP', 'Promo',
];
const setOrderIndex = code => {
  const i = SET_ORDER.indexOf(code);
  return i === -1 ? SET_ORDER.length : i;
};

let sets = [];         // [{set, imagenes}]
let reports = [];      // reports[] del índice (tools/reports/index.json, vía bucket)
let versionsFiles = []; // [{set, file}] desde versions-manifest.json (páginas estáticas, mismo origen)
let tipos = [];        // tipos derivados, en orden de columnas
let tipoFilter = 'all';
let estadoFilter = 'all';

const $ = s => document.querySelector(s);
const label = t => LABEL[t] || (t.charAt(0).toUpperCase() + t.slice(1));

function tipoOf(analisis) {
  return (analisis || '').split('-')[0];
}

// para cada (set, tipo): el reporte/página más reciente, si hay alguno
function findReport(set, tipo) {
  if (tipo === 'versions') {
    const f = versionsFiles.find(v => v.set === set);
    return f ? { file: f.file } : null;
  }
  const cand = reports.filter(r => r.set === set && tipoOf(r.analisis) === tipo);
  if (!cand.length) return null;
  cand.sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
  return cand[0];
}

function estadoOf(r) {
  if (!r) return 'pendiente';
  if (r.aplicado) return 'aplicado';
  if (r.review) return 'revisado';
  return 'analizado';
}

function cellContent(r, estado, tipo) {
  if (estado === 'pendiente') return { main: '—', sub: '' };
  // las páginas de versiones son estáticas (datos embebidos): no hay ok/diff/review
  // que leer del bucket, solo "existe, tocá para revisar".
  if (tipo === 'versions') return { main: 'Revisar', sub: 'Current' };
  if (estado === 'aplicado') return { main: 'aplicado', sub: r.aplicado.fecha || '' };
  if (estado === 'revisado') return { main: 'Enviado ✓', sub: `${r.review.decididas} decisiones · ${r.review.fecha || ''}` };
  const pendientes = (r.casi || 0) + (r.diff || 0) + (r.error || 0);
  return pendientes === 0
    ? { main: `${r.ok ?? 0} ok`, sub: 'todo ok' }
    : { main: `${r.ok ?? 0}/${r.total ?? ''} ok`, sub: `${pendientes} a revisar` };
}

function cellHref(c) {
  if (!c.r) return null;
  if (c.tipo === 'versions') return c.r.file;
  return TARGET[c.tipo] ? `${TARGET[c.tipo]}?report=${encodeURIComponent(BASE + c.r.file)}` : null;
}

Promise.all([
  fetch(`/api/download?url=${encodeURIComponent(BASE + 'index.json')}&name=index.json`).then(r => r.json()),
  // manifest generado en build/dev por scripts/gen.mjs (escanea public/reviews/ por
  // nombre de archivo) — mismo origen, sin CORS. Si no existe todavía, seguimos sin esa columna.
  fetch('versions-manifest.json').then(r => r.ok ? r.json() : { files: [] }).catch(() => ({ files: [] })),
]).then(([j, versionsManifest]) => {
  reports = j.reports || [];
  versionsFiles = versionsManifest.files || [];
  sets = (j.sets || []).slice().sort((a, b) => setOrderIndex(a.set) - setOrderIndex(b.set) || a.set.localeCompare(b.set));
  const present = [...new Set(reports.map(r => tipoOf(r.analisis)))];
  if (versionsFiles.length) present.push('versions');
  tipos = [...TIPO_ORDER.filter(t => present.includes(t)), ...present.filter(t => !TIPO_ORDER.includes(t)).sort()];
  for (const t of tipos) {
    const b = document.createElement('button');
    b.dataset.t = t; b.textContent = label(t);
    b.onclick = () => { document.querySelectorAll('#tipoFilters button').forEach(x => x.classList.remove('active')); b.classList.add('active'); tipoFilter = t; render(); };
    $('#tipoFilters').appendChild(b);
  }
  $('#tipoFilters button[data-t=all]').onclick = () => { document.querySelectorAll('#tipoFilters button').forEach(x => x.classList.remove('active')); $('#tipoFilters button[data-t=all]').classList.add('active'); tipoFilter = 'all'; render(); };
  if ($('#updated')) $('#updated').textContent = j.actualizado ? `Índice actualizado: ${j.actualizado}` : '';
  render();
}).catch(e => {
  $('#list').innerHTML = `<div class="empty">No pude cargar el índice de reportes: ${e.message}</div>`;
});

document.querySelectorAll('#estadoFilters button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#estadoFilters button').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); estadoFilter = b.dataset.e; render();
});

function render() {
  const wrap = document.querySelector('.grid-wrap');
  const cols = tipoFilter === 'all' ? tipos : [tipoFilter];
  if (!sets.length || !cols.length) {
    wrap.innerHTML = '<div class="empty">No hay reportes todavía.</div>';
    return;
  }

  const rowsData = sets.map(s => {
    const cells = cols.map(t => {
      const r = findReport(s.set, t);
      const estado = estadoOf(r);
      return { tipo: t, r, estado };
    });
    return { set: s.set, imagenes: s.imagenes, cells };
  }).filter(row => estadoFilter === 'all' || row.cells.some(c => c.estado === estadoFilter));

  if (!rowsData.length) {
    wrap.innerHTML = '<div class="empty">Ningún set con este filtro.</div>';
    return;
  }

  let html = '<table><thead><tr><th>Set</th>' + cols.map(t => `<th>${label(t)}</th>`).join('') + '</tr></thead><tbody>';
  for (const row of rowsData) {
    html += `<tr><td class="set-name">${row.set}</td>`;
    for (const c of row.cells) {
      const content = cellContent(c.r, c.estado, c.tipo);
      const inner = `<span class="main">${content.main}</span>${content.sub ? `<span class="sub">${content.sub}</span>` : ''}`;
      const href = cellHref(c);
      if (href) {
        html += `<td><a class="cell ${c.estado}" href="${href}">${inner}</a></td>`;
      } else {
        html += `<td><span class="cell ${c.estado}">${inner}</span></td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}
</script>
</body>
</html>
